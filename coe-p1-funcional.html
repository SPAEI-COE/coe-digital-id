<style>:root{--azul-900:#04003f;--azul-800:#060060;--azul-700:#09008d;--azul-600:#1a1bb0;--azul-500:#3538d4;--prata-400:#b3b3b3;--prata-300:#cfd4dc;--prata-200:#e4e8ef;--prata-100:#f2f4f8;--ouro:#c8aa00;--ouro-claro:#e8c82a;--grafite:#0b0d12;--grafite-800:#151922;--grafite-700:#212734;--branco:#fff;--neve:#f5f7fa;--ok:#1f9d55;--alerta:#c77700;--erro:#c0392b;--r-sm:6px;--r-md:10px;--r-lg:16px;--r-xl:22px;--sombra-1:0 1px 2px rgba(4,0,63,.08),0 2px 8px rgba(4,0,63,.06);--sombra-2:0 4px 12px rgba(4,0,63,.12),0 12px 32px rgba(4,0,63,.14);--sombra-3:0 20px 60px rgba(4,0,63,.28);--display:"Oswald","Arial Narrow",sans-serif;--corpo:"Inter",system-ui,sans-serif;--mono:"JetBrains Mono",ui-monospace,monospace}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:var(--corpo);background:var(--neve);color:var(--grafite);-webkit-font-smoothing:antialiased}
img{display:block;max-width:100%}
button{font-family:inherit;cursor:pointer;border:0;background:none}
input,select,textarea{font-family:inherit;font-size:.85rem;padding:.5em .65em;border:1px solid var(--prata-300);border-radius:var(--r-sm);background:#fff;color:var(--grafite);width:100%}
input:focus,select:focus,textarea:focus{outline:2px solid var(--azul-600);outline-offset:1px;border-color:var(--azul-600)}
.oculto{display:none!important}
.faixa-ouro{height:3px;background:linear-gradient(90deg,var(--ouro),var(--ouro-claro),var(--ouro))}
.mono{font-family:var(--mono)}

/* ===== botões ===== */
.btn{display:inline-flex;align-items:center;gap:.45em;font-weight:600;font-size:.82rem;padding:.55em 1em;border-radius:var(--r-sm);transition:filter .15s,transform .1s}
.btn:active{transform:translateY(1px)}
.btn-azul{background:var(--azul-700);color:#fff}.btn-azul:hover{filter:brightness(1.15)}
.btn-ouro{background:var(--ouro);color:var(--azul-900)}.btn-ouro:hover{background:var(--ouro-claro)}
.btn-borda{border:1px solid var(--prata-300);color:var(--grafite-700);background:#fff}.btn-borda:hover{background:var(--prata-100)}
.btn-erro{background:var(--erro);color:#fff}
.btn-min{font-size:.72rem;padding:.4em .7em}

/* ===== toast + aviso persistente ===== */
#toasts{position:fixed;bottom:1rem;left:50%;transform:translateX(-50%);z-index:400;display:flex;flex-direction:column;gap:.5rem;align-items:center}
.toast{background:var(--grafite-800);color:#fff;padding:.6em 1.1em;border-radius:var(--r-md);font-size:.82rem;box-shadow:var(--sombra-2);animation:sobe .25s ease}
.toast.ok{border-left:4px solid var(--ok)}.toast.erro{border-left:4px solid var(--erro)}
@keyframes sobe{from{opacity:0;transform:translateY(8px)}to{opacity:1}}
#avisoSync{position:fixed;top:0;left:0;right:0;z-index:500;background:var(--erro);color:#fff;padding:.7em 1rem;display:flex;gap:1em;align-items:center;justify-content:center;font-size:.85rem;font-weight:600;box-shadow:var(--sombra-2)}
#avisoSync .btn{background:#fff;color:var(--erro)}

/* ===== modais ===== */
.veu{position:fixed;inset:0;background:rgba(4,0,63,.55);backdrop-filter:blur(3px);z-index:300;display:flex;align-items:center;justify-content:center;padding:1.5rem;animation:fade .2s}
@keyframes fade{from{opacity:0}to{opacity:1}}
.caixa{background:#fff;border-radius:var(--r-lg);box-shadow:var(--sombra-3);max-width:min(94vw,560px);width:100%;overflow:hidden;display:flex;flex-direction:column;max-height:92vh}
.caixa-topo{background:linear-gradient(140deg,var(--azul-800),var(--azul-700) 60%,var(--azul-600));color:#fff;padding:.9em 1.2em;font-family:var(--display);font-size:1.05rem;text-transform:uppercase;letter-spacing:.04em;display:flex;justify-content:space-between;align-items:center}
.caixa-topo button{color:var(--prata-300);font-size:1.3rem;line-height:1}
.caixa-corpo{padding:1.2em;overflow:auto}
.caixa-pe{padding:.9em 1.2em;border-top:1px solid var(--prata-200);display:flex;gap:.6em;justify-content:flex-end;flex-wrap:wrap}

/* ===== LOGIN ===== */
.tela-login{min-height:100vh;display:flex;align-items:center;justify-content:center;background:radial-gradient(1200px 700px at 50% -10%,var(--azul-600),var(--azul-800) 55%,var(--azul-900));padding:1.5rem}
.login-cartao{background:linear-gradient(158deg,#fbfcfe,#eef1f7 45%,#e1e6ef);border-radius:var(--r-xl);box-shadow:var(--sombra-3);width:100%;max-width:400px;overflow:hidden}
.login-topo{background:linear-gradient(140deg,var(--azul-800),var(--azul-700) 55%,var(--azul-600));padding:1.6em 1.4em 1.3em;text-align:center}
.login-topo img{width:84px;height:84px;margin:0 auto .6em;filter:drop-shadow(0 2px 6px rgba(0,0,0,.45))}
.login-topo h1{font-family:var(--display);font-size:1.5rem;color:#fff;letter-spacing:.04em;text-transform:uppercase}
.login-topo p{font-family:var(--display);font-size:.68rem;letter-spacing:.3em;color:var(--prata-300);text-transform:uppercase;margin-top:.4em}
.login-corpo{padding:1.4em}
.login-corpo label{display:block;font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--grafite-700);margin:.9em 0 .35em}
.login-corpo .btn{width:100%;justify-content:center;margin-top:1.2em;font-size:.95rem;padding:.75em}
.login-tv{display:block;text-align:center;margin-top:1em;font-size:.8rem;color:var(--azul-700);font-weight:600;text-decoration:none}
.login-msg{margin-top:.9em;font-size:.8rem;color:var(--erro);font-weight:600;text-align:center;min-height:1.2em}
.login-off{margin-top:.8em;text-align:center;font-size:.72rem;color:var(--alerta);font-weight:600}
.credito{margin-top:1.1em;text-align:center;font-size:.62rem;color:var(--prata-400);letter-spacing:.05em}

/* ===== CARD INSTITUCIONAL (base compartilhada admin/TV) ===== */
.card-pm{background:linear-gradient(158deg,#fbfcfe,#eef1f7 45%,#e1e6ef);border-radius:var(--r-lg);overflow:hidden;box-shadow:var(--sombra-1);border:1px solid rgba(255,255,255,.5);position:relative;display:flex;flex-direction:column;transition:transform .15s,box-shadow .15s}
.card-pm:hover{transform:translateY(-3px);box-shadow:var(--sombra-2)}
.card-pm__topo{background:linear-gradient(140deg,var(--azul-800),var(--azul-700) 52%,var(--azul-600));padding:.55em .7em;display:flex;align-items:center;gap:.5em;position:relative}
.card-pm__topo:after{content:"";position:absolute;left:0;right:0;bottom:0;height:2px;background:linear-gradient(90deg,var(--ouro),var(--ouro-claro))}
.card-pm__brasao{width:1.7em;height:1.7em;flex:0 0 auto;filter:drop-shadow(0 1px 3px rgba(0,0,0,.4))}
.card-pm__posto{font-family:var(--display);font-weight:600;font-size:.92em;color:#fff;text-transform:uppercase;letter-spacing:.02em;line-height:1.05;flex:1;min-width:0}
.card-pm__chip{font-family:var(--display);font-size:.58em;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--azul-900);background:var(--ouro-claro);padding:.3em .7em;border-radius:3px;white-space:nowrap}
.card-pm__foto{aspect-ratio:3/4;background:linear-gradient(160deg,#c9d0dc,#9ea8b9);position:relative;overflow:hidden}
.card-pm__foto img{width:100%;height:100%;object-fit:cover;object-position:top center}
.card-pm__foto .sem-foto{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:.3em;color:#5f6a7d;font-size:.7em;font-weight:600}
.card-pm__foto .sem-foto svg{width:2.6em;height:2.6em;opacity:.55}
.card-pm__base{padding:.6em .7em .7em;display:flex;flex-direction:column;gap:.28em}
.card-pm__nome{font-family:var(--display);font-weight:600;font-size:.86em;line-height:1.12;text-transform:uppercase;color:var(--azul-900);display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;min-height:2.24em}
.card-pm__rg{font-family:var(--mono);font-size:.68em;font-weight:700;color:var(--grafite-700)}
.card-pm__funcao{font-size:.62em;color:#4a5262;font-weight:600;line-height:1.2;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.card-pm__tags{display:flex;gap:.35em;flex-wrap:wrap;margin-top:.1em}
.tag{font-size:.55em;font-weight:700;text-transform:uppercase;letter-spacing:.06em;padding:.25em .6em;border-radius:3px}
.tag-ok{background:#e3f5ea;color:var(--ok)}.tag-alerta{background:#fdf1e0;color:var(--alerta)}.tag-erro{background:#fbe7e4;color:var(--erro)}.tag-azul{background:#e6e6f7;color:var(--azul-700)}.tag-cinza{background:var(--prata-200);color:var(--grafite-700)}

/* ===== TV ===== */
.tv{height:100vh;background:radial-gradient(1400px 800px at 50% -15%,var(--azul-700),var(--azul-800) 50%,var(--azul-900));display:flex;flex-direction:column;overflow:hidden}
.tv.modo-grade{cursor:none}
.tv-topo{display:flex;align-items:center;gap:1em;padding:.7em 1.4em;background:rgba(4,0,63,.45)}
.tv-topo img{width:3.2em;height:3.2em;filter:drop-shadow(0 2px 6px rgba(0,0,0,.5))}
.tv-topo .t1{font-family:var(--display);font-weight:700;font-size:1.5em;color:#fff;letter-spacing:.03em;text-transform:uppercase;line-height:1}
.tv-topo .t2{font-family:var(--display);font-size:.62em;letter-spacing:.32em;color:var(--prata-300);text-transform:uppercase;margin-top:.35em}
.tv-topo .tv-sec{margin-left:auto;text-align:right}
.tv-topo .tv-sec .s1{font-family:var(--display);font-weight:600;font-size:1.25em;color:var(--ouro-claro);text-transform:uppercase;letter-spacing:.06em;line-height:1}
.tv-topo .tv-sec .s2{font-family:var(--mono);font-size:.62em;color:var(--prata-300);margin-top:.35em}
.tv-corpo{flex:1;padding:1.1em 1.4em 1.4em;overflow:hidden;position:relative}
.tv-grade{display:grid;gap:1em;align-content:start}
.tv-grade .card-pm:hover{transform:none;box-shadow:var(--sombra-1)}
.tv-secao-titulo{grid-column:1/-1;font-family:var(--display);font-weight:600;font-size:1em;color:var(--ouro-claro);text-transform:uppercase;letter-spacing:.12em;padding:.35em 0 .05em;border-bottom:1px solid rgba(200,170,0,.35);display:flex;align-items:baseline;gap:.6em}
.tv-secao-titulo small{font-family:var(--mono);font-size:.6em;color:var(--prata-300);letter-spacing:0}
.tv-pastas{display:grid;gap:1.2em;align-content:center;height:100%}
.tv-pasta{background:linear-gradient(158deg,rgba(251,252,254,.10),rgba(225,230,239,.05));border:1px solid rgba(207,212,220,.25);border-radius:var(--r-lg);padding:1em;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:.5em;text-align:center;cursor:pointer;transition:transform .15s,box-shadow .15s,border-color .15s}
.tv-pasta:hover,.tv-pasta:focus-visible{transform:translateY(-4px);border-color:var(--ouro);box-shadow:var(--sombra-2)}
.tv-pasta .p0{font-size:2.1em;line-height:1;filter:drop-shadow(0 2px 4px rgba(0,0,0,.4))}
.tv-voltar{background:rgba(255,255,255,.08);border:1px solid rgba(207,212,220,.3);color:#fff;font-family:var(--corpo);font-size:.72em;font-weight:600;padding:.5em 1em;border-radius:var(--r-md);cursor:pointer;letter-spacing:.02em}
.tv-voltar:hover{background:rgba(255,255,255,.16);border-color:var(--ouro)}
.tv-pasta.ativa{border-color:var(--ouro);box-shadow:0 0 0 2px rgba(200,170,0,.35),var(--sombra-2);background:linear-gradient(158deg,rgba(200,170,0,.14),rgba(232,200,42,.05))}
.tv-pasta .p1{font-family:var(--display);font-weight:600;font-size:1em;color:#fff;text-transform:uppercase;letter-spacing:.08em;line-height:1.1}
.tv-pasta .p2{font-family:var(--mono);font-size:.62em;color:var(--prata-300)}
.tv-rodape{position:absolute;bottom:.5em;right:1.4em;font-family:var(--mono);font-size:.6em;color:rgba(207,212,220,.55);display:flex;gap:1.2em}
.tv-pag{display:flex;gap:.4em}
.tv-pag i{width:.55em;height:.55em;border-radius:50%;background:rgba(207,212,220,.3)}
.tv-pag i.on{background:var(--ouro-claro)}

/* ===== ADMIN layout ===== */
.adm{min-height:100vh;display:grid;grid-template-columns:230px 1fr;grid-template-rows:auto 1fr}
.adm-topo{grid-column:1/-1;background:linear-gradient(140deg,var(--azul-800),var(--azul-700) 55%,var(--azul-600));color:#fff;display:flex;align-items:center;gap:1em;padding:.55em 1.1em;position:sticky;top:0;z-index:50;box-shadow:var(--sombra-2)}
.adm-topo img{width:2.4em;height:2.4em;filter:drop-shadow(0 2px 5px rgba(0,0,0,.45))}
.adm-topo .t1{font-family:var(--display);font-weight:700;font-size:1.1rem;letter-spacing:.03em;text-transform:uppercase;line-height:1}
.adm-topo .t2{font-family:var(--display);font-size:.56rem;letter-spacing:.28em;color:var(--prata-300);text-transform:uppercase;margin-top:.3em}
.adm-busca{flex:1;max-width:420px;margin-left:auto}
.adm-busca input{background:rgba(255,255,255,.12);border-color:rgba(255,255,255,.25);color:#fff}
.adm-busca input::placeholder{color:var(--prata-300)}
.pino{display:inline-flex;align-items:center;gap:.4em;font-size:.7rem;font-weight:600;color:var(--prata-300)}
.pino i{width:.6em;height:.6em;border-radius:50%;background:var(--erro)}
.pino.on i{background:var(--ok);box-shadow:0 0 6px var(--ok)}
.adm-user{font-size:.75rem;font-weight:600;text-align:right;line-height:1.2}
.adm-user small{color:var(--prata-300);font-weight:400;display:block;font-size:.62rem}
.adm-lado{background:#fff;border-right:1px solid var(--prata-200);padding:1em .7em;display:flex;flex-direction:column;gap:.2em}
.adm-lado button{display:flex;align-items:center;gap:.6em;width:100%;text-align:left;font-size:.83rem;font-weight:600;color:var(--grafite-700);padding:.6em .8em;border-radius:var(--r-sm)}
.adm-lado button:hover{background:var(--prata-100)}
.adm-lado button.ativo{background:var(--azul-700);color:#fff}
.adm-lado .sep{margin:.8em .4em .4em;font-size:.6rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--prata-400)}
.adm-main{padding:1.2em 1.4em;overflow:auto}
.adm-h1{font-family:var(--display);font-size:1.3rem;text-transform:uppercase;letter-spacing:.03em;color:var(--azul-900);margin-bottom:.9em;display:flex;align-items:center;gap:.8em;flex-wrap:wrap}
.adm-h1 .btn{margin-left:auto}

/* KPIs */
.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:.9em;margin-bottom:1.2em}
.kpi{background:#fff;border-radius:var(--r-md);box-shadow:var(--sombra-1);padding:1em;border-top:3px solid var(--azul-700);cursor:default}
.kpi.clic{cursor:pointer}.kpi.clic:hover{box-shadow:var(--sombra-2)}
.kpi .n{font-family:var(--display);font-weight:700;font-size:1.9rem;color:var(--azul-900);line-height:1}
.kpi .l{font-size:.68rem;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--grafite-700);margin-top:.4em}
.kpi.ouro{border-top-color:var(--ouro)}.kpi.alerta{border-top-color:var(--alerta)}.kpi.erro{border-top-color:var(--erro)}
.painel{background:#fff;border-radius:var(--r-md);box-shadow:var(--sombra-1);padding:1.1em;margin-bottom:1.1em}
.painel h3{font-family:var(--display);font-size:.95rem;text-transform:uppercase;letter-spacing:.05em;color:var(--azul-900);margin-bottom:.7em}
.barra-sec{display:flex;align-items:center;gap:.7em;font-size:.75rem;margin:.35em 0}
.barra-sec .rot{width:110px;font-weight:700;text-transform:uppercase;font-size:.68rem;color:var(--grafite-700);text-align:right}
.barra-sec .tr{flex:1;height:.85em;background:var(--prata-100);border-radius:4px;overflow:hidden}
.barra-sec .tr i{display:block;height:100%;background:linear-gradient(90deg,var(--azul-700),var(--azul-500));border-radius:4px}
.barra-sec .num{font-family:var(--mono);font-size:.7rem;width:2.5em}

/* filtros + grade efetivo */
.filtros{display:flex;gap:.6em;flex-wrap:wrap;margin-bottom:1em;align-items:center}
.filtros select,.filtros input{width:auto;min-width:150px}
.grade-adm{display:grid;grid-template-columns:repeat(auto-fill,minmax(158px,1fr));gap:.85em}
.grade-adm .card-pm{cursor:pointer;font-size:14px}

/* ===== FICHA ===== */
.ficha{max-width:min(96vw,900px)}
.ficha-cab{display:flex;gap:1.1em;padding:1.1em 1.2em;background:linear-gradient(158deg,#fbfcfe,#eef1f7 55%,#e1e6ef);border-bottom:1px solid var(--prata-200);align-items:flex-start;flex-wrap:wrap}
.ficha-foto{width:118px;flex:0 0 118px}
.ficha-foto .card-pm__foto{border-radius:var(--r-sm);box-shadow:var(--sombra-1);border:2px solid #fff}
.ficha-foto .btn{width:100%;justify-content:center;margin-top:.5em}
.ficha-id{flex:1;min-width:220px}
.ficha-id .nome{font-family:var(--display);font-weight:600;font-size:1.25rem;text-transform:uppercase;color:var(--azul-900);line-height:1.15}
.ficha-id .sub{font-size:.8rem;color:var(--grafite-700);font-weight:600;margin-top:.3em}
.ficha-id .rg{font-family:var(--mono);font-size:.8rem;font-weight:700;margin-top:.25em;color:var(--grafite-700)}
.ficha-id .card-pm__tags{margin-top:.6em;font-size:1.05rem}
.abas{display:flex;gap:.15em;padding:0 1em;background:var(--prata-100);border-bottom:1px solid var(--prata-200);overflow-x:auto;scrollbar-width:thin}
.abas button{font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:var(--grafite-700);padding:.7em .8em;border-bottom:3px solid transparent;white-space:nowrap}
.abas button.ativa{color:var(--azul-700);border-bottom-color:var(--ouro)}
.abas button.restr:after{content:" 🔒";font-size:.85em}
.ficha-corpo{padding:1.1em 1.2em;overflow:auto;flex:1;min-height:220px}
.form-gr{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:.7em .8em}
.campo label{display:block;font-size:.64rem;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--grafite-700);margin-bottom:.3em}
.campo.largo{grid-column:1/-1}
.nota-restr{background:#fbe7e4;border-left:4px solid var(--erro);border-radius:var(--r-sm);padding:.6em .8em;font-size:.72rem;font-weight:600;color:var(--erro);margin-bottom:.9em}
.nota-info{background:#e6e6f7;border-left:4px solid var(--azul-700);border-radius:var(--r-sm);padding:.6em .8em;font-size:.72rem;font-weight:600;color:var(--azul-800);margin-bottom:.9em}
.lista-reg{display:flex;flex-direction:column;gap:.6em}
.reg{border:1px solid var(--prata-200);border-radius:var(--r-sm);padding:.7em;background:var(--prata-100);position:relative}
.reg .form-gr{gap:.5em .6em}
.reg .rm{position:absolute;top:.35em;right:.45em;color:var(--erro);font-weight:700;font-size:.95rem}
.add-reg{margin-top:.7em}
.tl{border-left:2px solid var(--prata-300);margin-left:.4em;padding-left:1em;display:flex;flex-direction:column;gap:.6em}
.tl .reg:before{content:"";position:absolute;left:-1.42em;top:1em;width:.7em;height:.7em;border-radius:50%;background:var(--ouro);border:2px solid #fff;box-shadow:0 0 0 1px var(--prata-300)}

/* docs */
.doc-linha{display:flex;align-items:center;gap:.7em;padding:.55em .3em;border-bottom:1px solid var(--prata-200);font-size:.8rem}
.doc-linha .nm{flex:1;font-weight:600;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.doc-linha .cat{font-size:.62rem;font-weight:700;text-transform:uppercase;color:var(--azul-700);background:#e6e6f7;padding:.2em .5em;border-radius:3px}
.doc-linha .sz{font-family:var(--mono);font-size:.65rem;color:var(--grafite-700)}

/* QR */
.qr-area{display:flex;gap:1.2em;flex-wrap:wrap;align-items:flex-start}
.qr-img{background:#fff;border:1px solid var(--prata-200);border-radius:var(--r-md);padding:.7em;box-shadow:var(--sombra-1)}
.qr-img img{width:190px;height:190px;image-rendering:pixelated}
.qr-ctl{flex:1;min-width:240px;display:flex;flex-direction:column;gap:.6em}
.qr-link{font-family:var(--mono);font-size:.66rem;word-break:break-all;background:var(--prata-100);padding:.5em;border-radius:var(--r-sm);border:1px dashed var(--prata-300)}

/* tabelas */
.tb{width:100%;border-collapse:collapse;font-size:.76rem}
.tb th{font-size:.62rem;text-transform:uppercase;letter-spacing:.06em;color:var(--grafite-700);text-align:left;padding:.5em .6em;border-bottom:2px solid var(--prata-200)}
.tb td{padding:.5em .6em;border-bottom:1px solid var(--prata-100);vertical-align:middle}
.tb tr:hover td{background:var(--prata-100)}

/* seções (ordenar) */
.sec-item{display:flex;align-items:center;gap:.6em;background:#fff;border:1px solid var(--prata-200);border-radius:var(--r-sm);padding:.55em .7em;margin-bottom:.45em;font-size:.82rem;font-weight:600}
.sec-item .mv{display:flex;gap:.25em}
.sec-item .mv button{border:1px solid var(--prata-300);border-radius:4px;width:1.7em;height:1.7em;font-size:.8rem;color:var(--grafite-700)}
.sec-item .nm{flex:1;text-transform:uppercase}
.sec-item .ct{font-family:var(--mono);font-size:.68rem;color:var(--grafite-700)}
.sec-item.custom{border-left:4px solid var(--ouro)}

/* visão pública (#/v/) */
.pub{min-height:100vh;background:radial-gradient(1000px 600px at 50% -10%,var(--azul-600),var(--azul-800) 55%,var(--azul-900));display:flex;align-items:flex-start;justify-content:center;padding:2rem 1rem}
.pub-cartao{width:100%;max-width:430px;background:linear-gradient(158deg,#fbfcfe,#eef1f7 45%,#e1e6ef);border-radius:var(--r-xl);overflow:hidden;box-shadow:var(--sombra-3)}
.pub-foto{width:150px;margin:1em auto 0;border-radius:var(--r-sm);overflow:hidden;box-shadow:var(--sombra-2);border:3px solid #fff}
.pub-corpo{padding:1.2em 1.4em 1.5em;text-align:center}
.pub-corpo .nome{font-family:var(--display);font-weight:600;font-size:1.3rem;text-transform:uppercase;color:var(--azul-900)}
.pub-lin{display:flex;justify-content:space-between;gap:1em;font-size:.78rem;padding:.5em 0;border-bottom:1px solid var(--prata-200);text-align:left}
.pub-lin b{font-size:.62rem;text-transform:uppercase;letter-spacing:.07em;color:var(--grafite-700)}
.pub-selo{margin-top:1em;font-size:.62rem;color:var(--grafite-700);font-weight:600;text-transform:uppercase;letter-spacing:.08em}

@media (max-width:900px){.adm{grid-template-columns:1fr}.adm-lado{flex-direction:row;overflow-x:auto;border-right:0;border-bottom:1px solid var(--prata-200)}.adm-lado .sep{display:none}.adm-lado button{white-space:nowrap}}
@media print{.adm-topo,.adm-lado{display:none}}
</style>
</head>
<body>
<div id="app"></div>
<div id="toasts"></div>

/* ---------- localStorage seguro (rito: nunca quebrar se bloqueado) ---------- */
function lsGet(k){ try{ var v = localStorage.getItem('coep1_'+k); return v==null?null:JSON.parse(v); }catch(e){ return null; } }
function lsSet(k,v){ try{ localStorage.setItem('coep1_'+k, JSON.stringify(v)); }catch(e){} }
function lsDel(k){ try{ localStorage.removeItem('coep1_'+k); }catch(e){} }

/* ---------- utilidades ---------- */
function $(s,c){ return (c||document).querySelector(s); }
function $$(s,c){ return Array.prototype.slice.call((c||document).querySelectorAll(s)); }
function el(tag, attrs, kids){
  var n = document.createElement(tag);
  if(attrs) for(var k in attrs){
    if(k==='cls') n.className = attrs[k];
    else if(k==='html') n.innerHTML = attrs[k];
    else if(k==='text') n.textContent = attrs[k];
    else if(k.slice(0,2)==='on') n.addEventListener(k.slice(2), attrs[k]);
    else if(attrs[k]!=null) n.setAttribute(k, attrs[k]);
  }
  if(kids) kids.forEach(function(c){ if(c) n.appendChild(typeof c==='string'?document.createTextNode(c):c); });
  return n;
}
function esc(s){ return String(s==null?'':s).replace(/[&<>"']/g, function(c){ return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]; }); }
function debounce(fn, ms){ var t; return function(){ clearTimeout(t); var a=arguments,s=this; t=setTimeout(function(){ fn.apply(s,a); }, ms); }; }
function fdata(iso){ if(!iso) return '—'; var m=/^(\d{4})-(\d{2})-(\d{2})/.exec(iso); return m ? m[3]+'/'+m[2]+'/'+m[1] : iso; }
function hoje(){ var d=new Date(); return d.toISOString().slice(0,10); }
function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,9); }
function tokenNovo(){ var a='ABCDEFGHJKLMNPQRSTUVWXYZ23456789',s=''; for(var i=0;i<22;i++) s+=a[Math.floor(Math.random()*a.length)]; return s; }
function sha256(txt){
  if(window.crypto && crypto.subtle){
    return crypto.subtle.digest('SHA-256', new TextEncoder().encode(txt)).then(function(b){
      return Array.prototype.map.call(new Uint8Array(b), function(x){ return x.toString(16).padStart(2,'0'); }).join('');
    });
  }
  return Promise.reject(new Error('crypto indisponível'));
}
function bytesFmt(n){ return n>1048576 ? (n/1048576).toFixed(1)+' MB' : Math.round(n/1024)+' KB'; }

/* ---------- toast e aviso persistente (rito: falha de sync = aviso persistente) ---------- */
function toast(msg, tipo){
  var box = $('#toasts');
  var t = el('div',{cls:'toast '+(tipo||'')},[msg]);
  box.appendChild(t);
  setTimeout(function(){ t.remove(); }, 3000);
}
var syncPend = [];
function persistWarn(msg, retry){
  syncPend.push({msg:msg, retry:retry});
  desenhaAviso();
}
function desenhaAviso(){
  var a = $('#avisoSync');
  if(!syncPend.length){ if(a) a.remove(); return; }
  if(!a){ a = el('div',{id:'avisoSync'}); document.body.appendChild(a); }
  a.innerHTML='';
  var p = syncPend[0];
  a.appendChild(el('span',{text:'⚠ '+p.msg+(syncPend.length>1?' (+'+(syncPend.length-1)+' pendências)':'')}));
  a.appendChild(el('button',{cls:'btn btn-min',onclick:function(){ var it=syncPend.shift(); desenhaAviso(); if(it.retry) it.retry(); }},['Tentar de novo']));
  a.appendChild(el('button',{cls:'btn btn-min',onclick:function(){ syncPend.shift(); desenhaAviso(); }},['Dispensar']));
}

/* ---------- modais próprios (rito: jamais prompt/confirm nativos) ---------- */
function modal(titulo, corpoEl, botoes, extraCls){
  var veu = el('div',{cls:'veu'});
  var caixa = el('div',{cls:'caixa '+(extraCls||'')});
  caixa.appendChild(el('div',{cls:'caixa-topo'},[el('span',{text:titulo}), el('button',{'aria-label':'Fechar',onclick:fechar,html:'✕'})]));
  var corpo = el('div',{cls:'caixa-corpo'}); if(corpoEl) corpo.appendChild(corpoEl);
  caixa.appendChild(corpo);
  if(botoes && botoes.length){
    var pe = el('div',{cls:'caixa-pe'});
    botoes.forEach(function(b){ pe.appendChild(el('button',{cls:'btn '+(b.cls||'btn-borda'),onclick:function(){ if(b.acao) b.acao(fechar); else fechar(); }},[b.rotulo])); });
    caixa.appendChild(pe);
  }
  veu.appendChild(caixa);
  veu.addEventListener('click', function(e){ if(e.target===veu) fechar(); });
  document.body.appendChild(veu);
  function fechar(){ veu.remove(); }
  return { fechar: fechar, corpo: corpo, caixa: caixa };
}
function confirmar(msg, aoConfirmar){
  modal('Confirmação', el('p',{text:msg,style:'font-size:.88rem'}), [
    {rotulo:'Cancelar'},
    {rotulo:'Confirmar', cls:'btn-erro', acao:function(f){ f(); aoConfirmar(); }}
  ]);
}

/* ============================================================
   DADOS
   ============================================================ */
var seedIdx = {};
SEED.forEach(function(m){ seedIdx[m.rg]=m; });

function militar(rg){
  var s = seedIdx[rg] || null, o = OVR[rg] || null;
  if(!s && !o) return null;
  var base = s ? JSON.parse(JSON.stringify(s)) : { rg: rg, nome:'', posto:'', funcao:'', reparticao:'', situacao:'ATIVO', adido:false, aptidoes:[], cursos:[] };
  if(o) for(var k in o) if(k!=='ficha') base[k]=o[k];
  base.ficha = (o && o.ficha) || {};
  return base;
}
function efetivo(){
  var rgs = {};
  SEED.forEach(function(m){ rgs[m.rg]=1; });
  Object.keys(OVR).forEach(function(rg){ rgs[rg]=1; });
  return Object.keys(rgs).map(militar).filter(function(m){ return m && !m._del; });
}
function ordemPosto(p){ var i=POSTOS.indexOf(p); return i<0?POSTOS.length:i; }
function cmpPosto(a,b){ var d=ordemPosto(a.posto)-ordemPosto(b.posto); return d||a.nome.localeCompare(b.nome,'pt-BR'); }
function ordemSecoes(){
  var base = (CFG.ordem && CFG.ordem.length) ? CFG.ordem.slice() : ORDEM_PADRAO.slice();
  var presentes = {};
  efetivo().forEach(function(m){ if(m.reparticao) presentes[m.reparticao]=1; });
  Object.keys(presentes).forEach(function(s){ if(base.indexOf(s)<0) base.push(s); });
  Object.keys(CFG.pastas||{}).forEach(function(id){ if(base.indexOf('@'+id)<0) base.push('@'+id); });
  return base.filter(function(s){ return s[0]==='@' ? !!(CFG.pastas&&CFG.pastas[s.slice(1)]) : true; });
}
function nomeSecao(s){ return s[0]==='@' ? ((CFG.pastas[s.slice(1)]||{}).nome||'PASTA') : s; }
function membrosSecao(s){
  var tudo = efetivo();
  if(s[0]==='@'){
    var p = CFG.pastas[s.slice(1)]; if(!p) return [];
    var set = {}; (p.membros||[]).forEach(function(rg){ set[rg]=1; });
    return tudo.filter(function(m){ return set[m.rg]; }).sort(cmpPosto);
  }
  return tudo.filter(function(m){ return m.reparticao===s; }).sort(cmpPosto);
}
function vencMaisProximo(m){
  var hj = new Date(hoje()+'T00:00:00');
  var datas = [];
  if(m.habilitacao && m.habilitacao.validade) datas.push(m.habilitacao.validade);
  (m.aptidoes||[]).forEach(function(a){ if(a.validade) datas.push(a.validade); });
  (m.cursos||[]).forEach(function(c){ if(c.validade) datas.push(c.validade); });
  var best=null;
  datas.forEach(function(d){
    var dt=new Date(d+'T00:00:00'); if(isNaN(dt)) return;
    var dias=Math.round((dt-hj)/864e5);
    if(best===null||dias<best.dias) best={dias:dias,data:d};
  });
  return best;
}

/* ---------- persistência ---------- */
function espelhoLocal(){ lsSet('ovr', OVR); lsSet('cfg', CFG); }
function gravar(caminho, valor, descr){
  // rito: estado local + repaint IMEDIATOS, rede depois
  espelhoLocal();
  renderRota();
  if(!DB){ persistWarn('Sem conexão com o banco — "'+descr+'" ficou só neste dispositivo.', function(){ gravar(caminho,valor,descr); }); return Promise.resolve(false); }
  return DB.ref(NS+'/'+caminho).set(valor).then(function(){ return true; }).catch(function(e){
    persistWarn('Falha ao sincronizar "'+descr+'" com o banco.', function(){ gravar(caminho,valor,descr); });
    return false;
  });
}

  if(DB) DB.ref(NS+'/audit').push(ev).catch(function(){});

function carregaAdmins(){
  if(ADMINS!==null) return Promise.resolve(ADMINS);
  if(!DB){ ADMINS = lsGet('admins')||{}; return Promise.resolve(ADMINS); }

    .catch(function(){ ADMINS = lsGet('admins')||{}; return ADMINS; });
}

/* ============================================================
   ROTEADOR
   ============================================================ */
function rota(){ return location.hash.replace(/^#\/?/,'') || ''; }
function irPara(r){ location.hash = '#/'+r; }
function renderRota(){
  var r = rota(), app = $('#app');
  if(!app) return;
  if(/^v\//.test(r)){ VIEW.rota='pub'; renderPublico(app, r.slice(2)); return; }
  if(r==='tv'){ VIEW.rota='tv'; renderTV(app); return; }
  if(r==='admin'){
    if(!sessValida()){ irPara('login'); return; }
    VIEW.rota='adm'; renderAdmin(app); return;
  }
  VIEW.rota='login'; renderLogin(app);
}
function sessValida(){
  if(!SESS){ SESS = lsGet('sess'); }
  if(SESS && SESS.exp > Date.now()) return true;
  SESS=null; lsDel('sess'); return false;
}

function renderLogin(app){

function cardPM(m, opts){
  opts = opts||{};
  var foto = el('div',{cls:'card-pm__foto'});
  if(FOTOS[m.rg]) foto.appendChild(el('img',{src:FOTOS[m.rg],alt:'Foto de '+m.nome,loading:'lazy'}));
  else foto.appendChild(iconeSemFoto());
  var tags = el('div',{cls:'card-pm__tags'});
  if(m.situacao && m.situacao!=='ATIVO') tags.appendChild(el('span',{cls:'tag tag-alerta',text:m.situacao}));
  else tags.appendChild(el('span',{cls:'tag tag-ok',text:'Ativo'}));
  if(m.adido) tags.appendChild(el('span',{cls:'tag tag-azul',text:'Adido'}));
  var v = vencMaisProximo(m);
  if(v && v.dias<0) tags.appendChild(el('span',{cls:'tag tag-erro',text:'Doc. vencido'}));
  else if(v && v.dias<=60) tags.appendChild(el('span',{cls:'tag tag-alerta',text:'Vence '+v.dias+'d'}));
  var c = el('div',{cls:'card-pm',tabindex:opts.click?'0':null},[
    el('div',{cls:'card-pm__topo'},[
      el('img',{cls:'card-pm__brasao',src:window.__BRASAO__,alt:''}),
      el('div',{cls:'card-pm__posto',text:m.posto||'—'}),
      el('span',{cls:'card-pm__chip',text:m.reparticao||'—'})
    ]),
    foto,

      el('div',{cls:'card-pm__nome',text:m.nome}),
      el('div',{cls:'card-pm__rg',text:'RG '+m.rg}),
      el('div',{cls:'card-pm__funcao',text:m.funcao||''}),
      tags
    ])
  ]);
  if(opts.click){ c.addEventListener('click',function(){opts.click(m);}); c.addEventListener('keydown',function(e){ if(e.key==='Enter') opts.click(m); }); }
  return c;
}

   ============================================================ */
function pararTV(){ if(VIEW.tvTimer){ clearInterval(VIEW.tvTimer); VIEW.tvTimer=null; } }
function renderTV(app){
  pararTV();
  lsSet('tvMode', true);
  app.innerHTML='';
  var esc100 = Math.min(150, Math.max(80, +CFG.escala||100));
  var fator = Math.min(2.6, Math.max(.55, window.innerWidth/1920)); // 1080p=1×, 4K=2×
  var raiz = el('div',{cls:'tv'+(CFG.modoTV==='pastas'?'':' modo-grade'),style:'font-size:'+(16*fator*esc100/100).toFixed(2)+'px'});
  var secLbl = el('div',{cls:'s1'}), relog = el('div',{cls:'s2',cls:'s2'});
  raiz.appendChild(el('div',{cls:'tv-topo'},[
    el('img',{src:window.__BRASAO__,alt:''}),
    el('div',{},[
      el('div',{cls:'t1',text:'Comando de Operações Especiais'}),
      el('div',{cls:'t2',text:'Quadro do Efetivo · COE P1 Funcional'})
    ]),
    el('div',{cls:'tv-sec'},[secLbl, relog])
  ]));
  raiz.appendChild(el('div',{cls:'faixa-ouro'}));
  var corpo = el('div',{cls:'tv-corpo'});
  raiz.appendChild(corpo);
  app.appendChild(raiz);

  function tick(){ var d=new Date(); relog.textContent = d.toLocaleDateString('pt-BR',{weekday:'short',day:'2-digit',month:'2-digit',year:'numeric'})+' · '+d.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'}); }
  tick();

  var secs = ordemSecoes().filter(function(s){ return (CFG.ocultas||[]).indexOf(s)<0 && membrosSecao(s).length; });
  if(CFG.modoTV==='pastas' && VIEW.tvPasta && secs.indexOf(VIEW.tvPasta)<0) VIEW.tvPasta = null;
  var paginas = [], colsAtual = 4;
  var gradeFS = 16;
  function medidas(){
    // mede um card real (verdade do navegador — rito) e escolhe a maior
    // capacidade possível SEM sacrificar a foto (regra central do app)
    var fs = parseFloat(raiz.style.fontSize);
    var w = corpo.clientWidth - 2*1.4*fs, gap = Math.max(12, .85*fs);
    var alt = corpo.clientHeight - 1.7*fs;
    var probe = el('div',{cls:'tv-grade',style:'position:absolute;visibility:hidden;left:0;top:0;width:300px;grid-template-columns:1fr;font-size:16px'});
    var pc = cardPM(efetivo()[0]||{rg:'00000',nome:'PROVA DE MEDIDA DO CARD',posto:'Sd PM',funcao:'Medição',reparticao:'P1',situacao:'ATIVO',aptidoes:[],cursos:[]},{});
    var pt = el('div',{cls:'tv-secao-titulo'},['MEDIDA',el('small',{text:'0 PM'})]);
    probe.appendChild(pt); probe.appendChild(pc);
    corpo.appendChild(probe);
    var probeW = 300;
    var cardH0 = pc.getBoundingClientRect().height;      // altura do card com 300px de largura
    var titH0 = pt.getBoundingClientRect().height;
    probe.remove();
    var cromo = cardH0 - probeW*(4/3);                   // topo+base medidos a 16px
    var fotoMin = 8.6*fs;                                // largura mínima digna da foto
    function calc(cols){
      var cardW = (w-gap*(cols-1))/cols;
      var fsG = 16*cardW/260;                            // fonte do card proporcional à largura
      var cardH = cardW*(4/3) + cromo*fsG/16;
      var linhas = Math.floor((alt+gap)/(cardH+gap));
      return {cols:cols, cardW:cardW, cardH:cardH, titH:titH0*fsG/16, fsGrade:fsG, linhas:linhas, cap:cols*Math.max(0,linhas)};
    }
    var melhor = null;
    var colsMax = Math.max(2, Math.floor((w+gap)/(fotoMin+gap)));
    for(var cols=2; cols<=colsMax; cols++){
      var cand = calc(cols);
      if(cand.cardW < fotoMin) break;                    // PRIORIDADE 1: foto visível
      if(cand.linhas<1) continue;
      if(!melhor || cand.cap>melhor.cap || (cand.cap===melhor.cap && cand.cardW>melhor.cardW)) melhor = cand;
    }
    if(!melhor) melhor = calc(2);                        // tela muito pequena: foto acima de tudo
    colsAtual = melhor.cols; gradeFS = melhor.fsGrade;
    return { cols:melhor.cols, gap:gap, cardH:melhor.cardH, titH:melhor.titH, alt:alt };
  }
  function montar(){
    paginas = [];
    var md = medidas();
    function pagina(){ var p={sec:null,itens:[]}; paginas.push(p); return p; }
    if(CFG.modoTV==='pastas'){
      if(!VIEW.tvPasta){ paginas=[{sec:null,itens:[]}]; VIEW.tvPag=0; return; }
      var ms = membrosSecao(VIEW.tvPasta);
      var linhas = Math.max(1, Math.floor((md.alt+md.gap)/(md.cardH+md.gap)));
      var porPag = md.cols*linhas;
      for(var i=0;i<ms.length;i+=porPag){
        var p = pagina(); p.sec=VIEW.tvPasta; ms.slice(i,i+porPag).forEach(function(m){ p.itens.push({m:m}); });
      }
      if(!paginas.length) paginas=[{sec:VIEW.tvPasta,itens:[]}];
    } else {
      // empacotamento determinístico linha a linha (título ocupa linha inteira)
      var pg=null, y=0, col=0;
      function novaPagina(){ pg=pagina(); y=0; col=0; }
      novaPagina();
      secs.forEach(function(s){
        var ms = membrosSecao(s);
        // título: precisa de espaço para si + ao menos 1 linha de cards
        if(col>0){ y+=md.cardH+md.gap; col=0; }
        if(y + md.titH + md.gap + md.cardH > md.alt && pg.itens.length) novaPagina();
        pg.itens.push({tit:s}); y+=md.titH+md.gap;
        ms.forEach(function(m){
          if(col===0 && y+md.cardH>md.alt){ novaPagina(); pg.itens.push({tit:s,cont:true}); y+=md.titH+md.gap; }
          pg.itens.push({m:m});
          col++; if(col>=md.cols){ col=0; y+=md.cardH+md.gap; }
        });
      });
      paginas = paginas.filter(function(p){ return p.itens.some(function(i){return i.m;}); });
    }
    if(!paginas.length) paginas=[{sec:null,itens:[]}];
    if(VIEW.tvPag>=paginas.length) VIEW.tvPag=0;
  }
  function tilesPastas(){
    corpo.innerHTML='';
    secLbl.textContent = 'Selecione uma pasta';
    var wrap = el('div',{cls:'tv-pastas',style:'grid-template-columns:repeat(auto-fill,minmax(11.5em,1fr))'});
    secs.forEach(function(s){
      wrap.appendChild(el('div',{cls:'tv-pasta',tabindex:'0',onclick:function(){ VIEW.tvPasta=s; VIEW.tvPag=0; montar(); desenhaPagina(); },onkeydown:function(e){ if(e.key==='Enter'){ VIEW.tvPasta=s; VIEW.tvPag=0; montar(); desenhaPagina(); } }},[
        el('div',{cls:'p0',text:'📁'}),
        el('div',{cls:'p1',text:nomeSecao(s)}),
        el('div',{cls:'p2',text:membrosSecao(s).length+' PM'})
      ]));
    });
    corpo.appendChild(wrap);
    var rod = el('div',{cls:'tv-rodape'},[el('span',{text:'Escala '+esc100+'%'})]);
    corpo.appendChild(rod);
  }
  function desenhaPagina(){
    if(CFG.modoTV==='pastas' && !VIEW.tvPasta){ tilesPastas(); return; }
    corpo.innerHTML='';
    var pg = paginas[VIEW.tvPag % paginas.length];
    var grade = el('div',{cls:'tv-grade',style:'grid-template-columns:repeat('+colsAtual+',1fr);font-size:'+gradeFS.toFixed(2)+'px;gap:'+Math.max(12,.85*parseFloat(raiz.style.fontSize)).toFixed(1)+'px'});
    if(CFG.modoTV==='pastas'){
      secLbl.textContent = pg.sec ? nomeSecao(pg.sec) : 'Efetivo';
    } else {
      secLbl.textContent = 'Efetivo geral';
    }
    pg.itens.forEach(function(it){
      if(it.tit) grade.appendChild(el('div',{cls:'tv-secao-titulo'},[nomeSecao(it.tit)+(it.cont?' (continuação)':''), el('small',{text:membrosSecao(it.tit).length+' PM'})]));
      else grade.appendChild(cardPM(it.m,{}));
    });
    corpo.appendChild(grade);
    var rod = el('div',{cls:'tv-rodape'});
    if(CFG.modoTV==='pastas'){
      rod.appendChild(el('button',{cls:'tv-voltar',onclick:function(){ VIEW.tvPasta=null; VIEW.tvPag=0; desenhaPagina(); }},['← Voltar às pastas']));
    }
    if(paginas.length>1){
      var pag = el('div',{cls:'tv-pag'});
      for(var i=0;i<Math.min(paginas.length,16);i++) pag.appendChild(el('i',{cls:i===(VIEW.tvPag%paginas.length)?'on':''}));
      rod.appendChild(pag);
      rod.appendChild(el('span',{text:'Página '+((VIEW.tvPag%paginas.length)+1)+'/'+paginas.length}));
    }
    rod.appendChild(el('span',{text:'Escala '+esc100+'%'}));
    corpo.appendChild(rod);
    // rede de segurança (rito): se ainda estourar, tira 1 card e redesenha
    var guarda = 0;
    while(corpo.scrollHeight > corpo.clientHeight + 2 && guarda++ < 40){
      for(var k=pg.itens.length-1;k>=0;k--){ if(pg.itens[k].m){ pg.itens.splice(k,1); break; } }
      if(!pg.itens.some(function(i){return i.m;})) break;
      corpo.querySelectorAll('.tv-grade .card-pm')[corpo.querySelectorAll('.tv-grade .card-pm').length-1].remove();
    }
  }
  montar(); desenhaPagina();
  var seg = 0;
  VIEW.tvTimer = setInterval(function(){
    tick(); seg++;
    var t = Math.max(5, +CFG.tempoPag||12);
    if(seg<t) return;
    seg=0;
    if(CFG.modoTV==='pastas'){
      if(!VIEW.tvPasta) return; // menu parado — espera clique, não gira sozinho
      if(paginas.length>1 && VIEW.tvPag < paginas.length-1){ VIEW.tvPag++; }
      else { VIEW.tvPasta=null; VIEW.tvPag=0; montar(); } // terminou de mostrar a pasta inteira → volta ao menu sozinho
      desenhaPagina();
    } else if(paginas.length>1){ VIEW.tvPag=(VIEW.tvPag+1)%paginas.length; desenhaPagina(); }
  }, 1000);
  raiz.addEventListener('click', function(){
    if(document.fullscreenElement) return;
    if(raiz.requestFullscreen) raiz.requestFullscreen().catch(function(){});
  });
}

  POSTOS.forEach(function(p){ selPosto.appendChild(el('option',{value:p,text:p,selected:f.posto===p?'':null})); });
  var selSit = el('select',{onchange:function(e){ f.sit=e.target.value; renderRota(); }},[

    el('option',{value:'semfoto',text:'Sem foto',selected:f.sit==='semfoto'?'':null}),

  var q = (f.q||'').normalize('NFD').replace(/[\u0300-\u036f]/g,'').toLowerCase();

function subirFoto(rg, file, done){
  var img = new Image(), rd = new FileReader();
  rd.onload = function(){ img.src = rd.result; };
  img.onload = function(){
    var max = 640, w=img.width, h=img.height, k=Math.min(1, max/Math.max(w,h));
    var cv = document.createElement('canvas'); cv.width=Math.round(w*k); cv.height=Math.round(h*k);
    cv.getContext('2d').drawImage(img,0,0,cv.width,cv.height);
    var data = cv.toDataURL('image/jpeg',.82);
    FOTOS[rg]=data;            // repaint imediato (rito)
    if(done) done();
    toast('Foto atualizada.','ok');
    gravar('fotos/'+rg, data, 'foto de '+rg);
    auditar('foto', rg, bytesFmt(data.length));
  };
  img.onerror = function(){ toast('Arquivo de imagem inválido.','erro'); };
  rd.readAsDataURL(file);
}

function formCampos(defs, valores, extraCls){
  var wrap = el('div',{cls:'form-gr '+(extraCls||'')}), inputs={};
  defs.forEach(function(d){
    var v = valores && valores[d.id]!=null ? valores[d.id] : (d.def!=null?d.def:'');
    var inp;
    if(d.tipo==='select'){ inp = el('select'); (d.ops||[]).forEach(function(o){ inp.appendChild(el('option',{value:o,text:o,selected:String(v)===o?'':null})); }); }
    else if(d.tipo==='textarea'){ inp = el('textarea',{rows:'2'}); inp.value=v; }
    else if(d.tipo==='check'){ inp = el('select'); ['Não','Sim'].forEach(function(o){ inp.appendChild(el('option',{value:o,text:o,selected:(v===true||v==='Sim')===(o==='Sim')?'':null})); }); }
    else { inp = el('input',{type:d.tipo||'text',value:v}); }
    inputs[d.id]=inp;
    wrap.appendChild(el('div',{cls:'campo'+(d.largo?' largo':'')},[el('label',{text:d.rot}),inp]));
  });
  return { no:wrap, ler:function(){ var o={}; defs.forEach(function(d){ var x=inputs[d.id].value; o[d.id] = d.tipo==='check' ? x==='Sim' : x; }); return o; } };
}

function abaDocs(area, m){

  function desenha(){
    area.innerHTML='';
    area.appendChild(el('p',{cls:'nota-info',text:'PDFs e imagens até 2 MB. Os arquivos só são baixados do banco quando solicitados (carregamento sob demanda).'}));
    var inFile = el('input',{type:'file',accept:'application/pdf,image/*',style:'display:none',onchange:function(e){ if(e.target.files[0]) enviar(e.target.files[0]); }});
    var selCat = el('select',{style:'max-width:200px'});

      el('button',{cls:'btn btn-azul btn-min',onclick:function(){ inFile.click(); }},['⬆ Enviar arquivo']), inFile]));
    var lista = Object.keys(meta||{}).map(function(id){ return Object.assign({id:id},meta[id]); }).sort(function(a,b){ return b.ts-a.ts; });
    if(!lista.length) area.appendChild(el('p',{style:'font-size:.8rem;color:#4a5262',text:'Nenhum documento anexado.'}));
    lista.forEach(function(d){
      area.appendChild(el('div',{cls:'doc-linha'},[

        el('span',{cls:'nm',text:d.nome}),

      ]));
    });
    function enviar(file){
      if(file.size>2*1048576){ toast('Arquivo acima de 2 MB.','erro'); return; }
      var rd = new FileReader();
      rd.onload = function(){
        var id = uid();
        var info = {nome:file.name, cat:selCat.value, size:file.size, ts:Date.now(), mime:file.type};
        if(!DOCS[m.rg]) DOCS[m.rg]={};

    if(!m){ erroPub('Registro não encontrado.'); return; }
    function corpo(){
      cx.innerHTML='';
      cx.appendChild(el('div',{cls:'login-topo'},[
        el('img',{src:window.__BRASAO__,alt:''}),
        el('h1',{text:'Identificação funcional'}),
        el('p',{text:'Comando de Operações Especiais · PMERJ'})
      ]));
      cx.appendChild(el('div',{cls:'faixa-ouro'}));
      var f = el('div',{cls:'pub-foto card-pm__foto'});
      if(FOTOS[m.rg]) f.appendChild(el('img',{src:FOTOS[m.rg],alt:''})); else f.appendChild(iconeSemFoto());
      cx.appendChild(f);
      var pc = el('div',{cls:'pub-corpo'});
      pc.appendChild(el('div',{cls:'nome',text:m.nome}));
      function lin(rot,val){ if(val) pc.appendChild(el('div',{cls:'pub-lin'},[el('b',{text:rot}),el('span',{text:val})])); }
      lin('Posto/Graduação', m.posto);
      lin('RG', m.rg);
      lin('Função', m.funcao);
      lin('Seção', m.reparticao);
      if(reg.nivel>=2){
        lin('Situação', m.situacao);
        if(m.habilitacao&&m.habilitacao.categoria) lin('Habilitação', 'Cat. '+m.habilitacao.categoria+' · validade '+fdata(m.habilitacao.validade));
        var cs = (m.cursos||[]).map(function(c){return c.nome||c.curso;}).filter(Boolean).join(', ');
        lin('Cursos', cs);
      }
      if(reg.nivel>=3){
        var fu = fichaGet(m,'func')||{};
        lin('Unidade atual', fu.atual);
        lin('Data de inclusão', fdata(fu.inclusao));
        lin('Matrícula', fu.matricula);
      }
      if(reg.nivel>=4){
        var hist=(fichaGet(m,'hist')||[]);
        if(hist.length) lin('Histórico', hist.map(function(h){return fdata(h.data)+' '+(h.tipo||'')+': '+(h.descr||'');}).join(' · '));
        var lic=(fichaGet(m,'lic')||[]);
        if(lic.length) lin('Licenças', lic.map(function(l){return (l.tipo||'')+' '+fdata(l.ini)+'–'+fdata(l.fim);}).join(' · '));
      }
      pc.appendChild(el('div',{cls:'pub-selo',text:'Nível '+reg.nivel+' · válido até '+new Date(reg.exp).toLocaleDateString('pt-BR')}));
      cx.appendChild(pc);
    }
    if(reg.nivel>=3 && reg.codigoHash){
      cx.innerHTML='';
      cx.appendChild(el('div',{cls:'login-topo'},[el('img',{src:window.__BRASAO__,alt:''}),el('h1',{text:'Acesso restrito'})]));
      cx.appendChild(el('div',{cls:'faixa-ouro'}));
      var iCod = el('input',{inputmode:'numeric',placeholder:'Código de acesso (6 dígitos)'});
      var msg = el('div',{cls:'login-msg'});
      cx.appendChild(el('div',{cls:'login-corpo'},[iCod,
        el('button',{cls:'btn btn-azul',style:'margin-top:.8em;width:100%;justify-content:center',onclick:function(){
          sha256(tk+':'+iCod.value.trim()).then(function(h){ if(h===reg.codigoHash) corpo(); else msg.textContent='Código incorreto.'; });
        }},['Verificar']), msg]));
    } else corpo();
  }
  if(SHARE[tk]) { mostra(SHARE[tk]); return; }
  if(!DB){ erroPub('Sem conexão com o banco para validar este link.'); return; }
  cx.appendChild(el('div',{cls:'pub-corpo'},[el('p',{text:'Validando…'})]));
  DB.ref(NS+'/share/'+tk).once('value').then(function(s){ mostra(s.val()); }).catch(function(){ erroPub('Falha ao validar o link.'); });
}

/* ============================================================
   BOOT
   ============================================================ */
function boot(){
  var ovrLS = lsGet('ovr'); if(ovrLS) OVR = ovrLS;
  var cfgLS = lsGet('cfg'); if(cfgLS) CFG = Object.assign(CFG, cfgLS);
  initFirebase();
  if(!location.hash){
    if(/[?&]tv=1/.test(location.search) || lsGet('tvMode')) irPara('tv');
    else irPara('login');
  }
  window.addEventListener('hashchange', renderRota);
  // rito: UM único listener de resize, sempre debounced
  window.addEventListener('resize', debounce(function(){ if(VIEW.rota==='tv') renderRota(); }, 220));
  document.addEventListener('keydown', function(e){ if(e.key==='Escape' && VIEW.rota==='tv'){ lsDel('tvMode'); irPara('login'); } });
  renderRota();
}
document.addEventListener('DOMContentLoaded', boot);
</script>
</body>
</html>
